<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>守塔猫 · 猫属MBTI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #f5efe6;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Serif SC', serif;
            padding: 20px;
            color: #2c2418;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 48px;
            padding: 24px 20px 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            border: 1px solid #e9dfd1;
        }
        h1 {
            font-size: 28px;
            text-align: center;
            color: #5e4b3c;
            letter-spacing: -0.3px;
        }
        .sub {
            text-align: center;
            font-size: 13px;
            color: #b6a28a;
            padding-bottom: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid #e9dfd1;
        }
        .question {
            background: #fefaf5;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #f0e4d6;
            transition: all 0.1s ease;
        }
        .question-text {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 16px;
            padding-left: 4px;
            color: #7c5f48;
        }
        .option {
            background: white;
            border-radius: 60px;
            padding: 12px 18px;
            margin-bottom: 10px;
            border: 1px solid #e9dfd1;
            cursor: pointer;
            font-size: 15px;
            transition: 0.1s;
            color: #3f3324;
        }
        .option.selected {
            background: #f9efd9;
            border-color: #c9ab8b;
        }
        .btn {
            background: #dcccb8;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 500;
            color: #4a3727;
            margin-top: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn:active {
            background: #cbbca6;
            transform: scale(0.97);
        }
        .result {
            background: #fef3e8;
            border-radius: 32px;
            padding: 24px 20px;
            margin-top: 28px;
            text-align: center;
            border: 1px solid #eddccd;
        }
        .hidden {
            display: none;
        }
        footer {
            text-align: center;
            font-size: 11px;
            color: #cdbcab;
            margin-top: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🐾 守塔猫 · 猫属MBTI</h1>
    <div class="sub">云养猫的人间手账 · 六道题找出你的猫格</div>

    <div id="questionsBox"></div>

    <button class="btn" id="submitBtn">✨ 轻触塔砖 · 揭晓猫格 ✨</button>

    <div id="resultBox" class="result hidden"></div>
    <footer>暮色笼万物，猫在塔边等你 🐈</footer>
</div>

<script>
    (function() {
        // ---------- 题库 ----------
        const questionList = [
            "傍晚，你看到云在天空跳舞，你会？",
            "一只鸟在你面前唱远方的童谣，你会？",
            "一片花瓣落在你的鼻尖，你会？",
            "你爬上一棵新绿的树，你会？",
            "塔的年龄你不知道，你会？",
            "暮色降临，远处有灯火和人影，你会？"
        ];

        const optionsList = [
            ["嗔怪云太矜娇，继续蹲坐", "轻抖身子，绒球似的团成一团", "用爪子轻轻拍下一瓣花", "盯着霞光发呆，直到夜色"],
            ["听很久，但不跟去", "试着模仿它的声音", "想起自己的“塔”，转身回去", "问它：南方冷吗"],
            ["轻轻拍下，看它钻进草丛", "顶着花瓣继续走", "把它放在塔脚边", "闻一闻，然后打个喷嚏"],
            ["躺着睡一觉，梦蝴蝶", "看很久天空", "轻轻踩每一根树枝", "想叫云也来看"],
            ["无所谓，反正它在", "偶尔用爪子量一量", "把它当旧笔，写故事", "觉得它是沉默的朋友"],
            ["浅浅呼吸，准备睡", "盯着灯火看一会儿", "缩成一团绒球", "想：云明天还会来吗"]
        ];

        // MBTI 映射 (A/B/C/D -> 性格)
        const mbtiMap = [
            ["INFP","ISFP","ENFP","INFJ"],
            ["ISTJ","ESFP","ISFJ","INFP"],
            ["ISFP","ENFJ","ISTJ","ESFP"],
            ["INFP","INFJ","ISFP","ENFP"],
            ["ISTJ","ISFP","INFJ","ENFJ"],
            ["ISFJ","INFP","ISFP","INFJ"]
        ];

        const catDict = {
            "INFP": "晚照猫 🐾🌇 · 浪漫敏感，爱守着自己的“塔”回忆。",
            "ISFP": "绒球猫 🐈⬛✨ · 灵动随性，在探索与安睡间平衡。",
            "ENFP": "花间猫 🌸🐾 · 好奇爱分享，喜欢叫云也来看。",
            "INFJ": "夜灯猫 🌙🐈 · 深邃观察者，暮色是塔最老的客人。",
            "ISTJ": "守塔猫 🗼🐱 · 可靠念旧，塔在猫在。",
            "ISFJ": "浅息猫 🍃😴 · 温柔体贴，云明天来不来都没关系。",
            "ESFP": "雪印猫 ❄️🐾 · 活泼爱玩，留下梅花印。",
            "ENFJ": "旧笔猫 📜🐈 · 讲述者，用四时写故事。"
        };

        let userAnswers = [null, null, null, null, null, null];

        // ---------- 渲染题目 ----------
        function renderAllQuestions() {
            const container = document.getElementById("questionsBox");
            if (!container) return;
            container.innerHTML = "";

            for (let i = 0; i < questionList.length; i++) {
                const qDiv = document.createElement("div");
                qDiv.className = "question";
                qDiv.setAttribute("data-qidx", i);

                const qTitle = document.createElement("div");
                qTitle.className = "question-text";
                qTitle.innerText = `${i+1}. ${questionList[i]}`;
                qDiv.appendChild(qTitle);

                const opts = optionsList[i];
                for (let j = 0; j < opts.length; j++) {
                    const optDiv = document.createElement("div");
                    optDiv.className = "option";
                    optDiv.innerText = `${String.fromCharCode(65+j)}. ${opts[j]}`;
                    optDiv.setAttribute("data-val", j);
                    optDiv.onclick = (function(qIndex, optIndex) {
                        return function() {
                            // 移除同组其他选中样式
                            const parentQ = this.parentNode;
                            const allOpts = parentQ.querySelectorAll(".option");
                            allOpts.forEach(opt => opt.classList.remove("selected"));
                            this.classList.add("selected");
                            userAnswers[qIndex] = optIndex;
                        };
                    })(i, j);
                    qDiv.appendChild(optDiv);
                }
                container.appendChild(qDiv);
            }
        }

        // ---------- 计算并显示结果 ----------
        function showFinalResult() {
            // 检查是否全部答完
            for (let i = 0; i < userAnswers.length; i++) {
                if (userAnswers[i] === null) {
                    alert("🐱 猫轻轻蹭你：还有几道题没选完哟～ 选完再轻触塔砖吧。");
                    return;
                }
            }

            // 统计性格出现次数
            const typeCount = {};
            for (let i = 0; i < userAnswers.length; i++) {
                const selectedIdx = userAnswers[i];
                const mbtiType = mbtiMap[i][selectedIdx];
                typeCount[mbtiType] = (typeCount[mbtiType] || 0) + 1;
            }

            let maxType = null;
            let maxNum = -1;
            for (const [t, cnt] of Object.entries(typeCount)) {
                if (cnt > maxNum) {
                    maxNum = cnt;
                    maxType = t;
                }
            }

            if (!maxType) return;
            const finalDesc = catDict[maxType] || `神秘猫 · 藏在塔影里`;
            const resultDiv = document.getElementById("resultBox");
            if (!resultDiv) return;
            resultDiv.classList.remove("hidden");
            resultDiv.innerHTML = `
                <div style="font-size: 28px; margin-bottom: 6px;">✨</div>
                <div style="font-size: 22px; font-weight: 500; margin-bottom: 12px;">${maxType} · ${finalDesc}</div>
                <div style="font-size: 14px; margin-top: 10px;">🐾 暮色亮起时，记得回塔边看看云。</div>
            `;
            resultDiv.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        // 绑定全局按钮
        function bindButton() {
            const btn = document.getElementById("submitBtn");
            if (btn) {
                btn.onclick = showFinalResult;
            }
        }

        // 启动
        renderAllQuestions();
        bindButton();
    })();
</script>
</body>
</html>
